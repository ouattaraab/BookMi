name: Deploy to Production

# Déclenché uniquement après la réussite du CI Laravel sur main
on:
  workflow_run:
    workflows: ["CI Laravel"]
    types: [completed]
    branches: [main]

# Un seul déploiement à la fois — ne pas annuler un déploiement en cours
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    # Ne déployer que si le CI est passé
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Vite assets ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bookmi/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: bookmi

      - name: Build Vite assets
        run: npm run build
        working-directory: bookmi

      # ── Configurer SSH ─────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 bookmi.click >> ~/.ssh/known_hosts

      # ── Déployer le code PHP ───────────────────────────────────────────
      # Stratégie :
      #   1. bookmi_app/ = repo git + build complet (composer, migrations)
      #   2. rsync bookmi_app/ → domains/bookmi.click/ (web server root)
      #   3. Régénérer le cache de routes SUR domains/bookmi.click/ pour
      #      que base_path() soit correct lors de l'exécution web
      - name: Deploy PHP code
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            set -e
            cd /home/u726808002/bookmi_app

            # 1. Pull latest code (updates bookmi/ subdirectory)
            git pull origin main

            # 2. Sync bookmi/ app files into bookmi_app/ (build environment)
            rsync -a --exclude="vendor/" --exclude="storage/" --exclude=".env" \
              --exclude="node_modules/" --exclude=".git/" \
              bookmi/ ./

            # 3. Install/update PHP dependencies at bookmi_app/
            composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-sodium --quiet

            # 4. Run migrations at bookmi_app/ (needs .env — only here)
            php artisan migrate --force

            # 5. Clear ALL caches — do NOT rebuild yet (will rebuild at web root)
            php artisan optimize:clear

            # 6. Create storage symlink at bookmi_app/
            php artisan storage:link --force 2>/dev/null || true

            # 7. Sync the fully-built app to the actual web-served directory
            #    Preserve: .env and storage/ at destination; exclude git source
            rsync -a \
              --exclude="bookmi/" \
              --exclude="storage/" \
              --exclude=".env" \
              --exclude=".git/" \
              --exclude="node_modules/" \
              /home/u726808002/bookmi_app/ \
              /home/u726808002/domains/bookmi.click/

            # 8. Diagnostic — comprendre la structure réelle du serveur web
            echo "=== DIAGNOSTIC SERVER STRUCTURE ==="
            echo "-- domains/bookmi.click/ (top) --"
            ls /home/u726808002/domains/bookmi.click/ 2>/dev/null | head -15 || echo "NOT FOUND"
            echo "-- public_html/ --"
            ls /home/u726808002/domains/bookmi.click/public_html/ 2>/dev/null | head -20 || echo "NOT FOUND"
            echo "-- public_html/index.php (first 20 lines) --"
            head -20 /home/u726808002/domains/bookmi.click/public_html/index.php 2>/dev/null || echo "NOT FOUND"
            echo "-- .env present at bookmi_app : $([ -f /home/u726808002/bookmi_app/.env ] && echo YES || echo NO)"
            echo "-- .env present at domains    : $([ -f /home/u726808002/domains/bookmi.click/.env ] && echo YES || echo NO)"
            echo "-- .env present at public_html: $([ -f /home/u726808002/domains/bookmi.click/public_html/.env ] && echo YES || echo NO)"
            echo "-- routes-v7 at bookmi_app    : $([ -f /home/u726808002/bookmi_app/bootstrap/cache/routes-v7.php ] && echo YES || echo NO)"
            echo "-- routes-v7 at domains       : $([ -f /home/u726808002/domains/bookmi.click/bootstrap/cache/routes-v7.php ] && echo YES || echo NO)"
            echo "-- routes-v7 at public_html   : $([ -f /home/u726808002/domains/bookmi.click/public_html/bootstrap/cache/routes-v7.php ] && echo YES || echo NO)"
            echo "-- public_html/bootstrap/ exists: $([ -d /home/u726808002/domains/bookmi.click/public_html/bootstrap ] && echo YES || echo NO)"
            echo "=== END DIAGNOSTIC ==="

            # 9. Régénérer le cache sur domains/bookmi.click/ si .env présent
            if [ -f /home/u726808002/domains/bookmi.click/.env ]; then
              echo "Re-generating caches at domains/bookmi.click/ (web server base path)..."
              cd /home/u726808002/domains/bookmi.click
              php artisan optimize:clear 2>/dev/null || true
              php artisan optimize
              php artisan storage:link --force 2>/dev/null || true
              echo "--- Consent routes at domains/ ---"
              php artisan route:list --path=consents 2>&1 | head -20 || echo "unavailable"
              cd /home/u726808002/bookmi_app
            else
              echo ".env NOT found at domains/bookmi.click/ — regenerating cache at bookmi_app/ only"
              php artisan optimize
              echo "--- Consent routes at bookmi_app/ ---"
              php artisan route:list --path=consents 2>&1 | head -20 || echo "unavailable"
            fi

            # 10. Si le Laravel complet est dans public_html/ (app root = public_html/)
            if [ -f /home/u726808002/domains/bookmi.click/public_html/artisan ]; then
              echo "Laravel app detected inside public_html/ — re-generating caches there too"
              cd /home/u726808002/domains/bookmi.click/public_html
              php artisan optimize:clear 2>/dev/null || true
              php artisan optimize 2>/dev/null || true
              echo "--- Consent routes at public_html/ ---"
              php artisan route:list --path=consents 2>&1 | head -20 || echo "unavailable"
              cd /home/u726808002/bookmi_app
            fi

            echo "PHP deploy OK"
          '

      # ── Déployer les assets Vite vers le webroot ───────────────────────
      - name: Upload Vite assets to webroot
        run: |
          rsync -az --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_ed25519" \
            bookmi/public/build/ \
            u726808002@bookmi.click:/home/u726808002/domains/bookmi.click/public_html/build/

      # ── Synchroniser le manifest vers les deux emplacements publics ────
      - name: Sync manifest to public paths
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            SRC=/home/u726808002/domains/bookmi.click/public_html/build/manifest.json
            # Copier vers bookmi_app/public/build/ (référence CLI)
            mkdir -p /home/u726808002/bookmi_app/public/build/
            cp "$SRC" /home/u726808002/bookmi_app/public/build/manifest.json 2>/dev/null || true
            # Copier vers domains/bookmi.click/public/build/ (si public/ existe)
            mkdir -p /home/u726808002/domains/bookmi.click/public/build/ 2>/dev/null || true
            cp "$SRC" /home/u726808002/domains/bookmi.click/public/build/manifest.json 2>/dev/null || true
            echo "Manifest synced OK"
          '

      # ── Réinitialiser l'OPcache du serveur web ─────────────────────────
      - name: Reset OPcache
        run: |
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bookmi.click/opcache_reset.php)
          echo "OPcache reset HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "OPcache reset OK"
          else
            echo "OPcache reset may have failed (status $HTTP_STATUS) — continuing anyway"
          fi

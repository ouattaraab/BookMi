name: Deploy to Production

# Déclenché uniquement après la réussite du CI Laravel sur main
on:
  workflow_run:
    workflows: ["CI Laravel"]
    types: [completed]
    branches: [main]

# Un seul déploiement à la fois — ne pas annuler un déploiement en cours
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    # Ne déployer que si le CI est passé
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Vite assets ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bookmi/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: bookmi

      - name: Build Vite assets
        run: npm run build
        working-directory: bookmi

      # ── Configurer SSH ─────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 bookmi.click >> ~/.ssh/known_hosts

      # ── Déployer le code PHP ───────────────────────────────────────────
      # Stratégie :
      #   1. bookmi_app/ = repo git + build complet (composer, artisan)
      #   2. domains/bookmi.click/ = répertoire servi par le web server
      #   On synchronise bookmi_app/ → domains/bookmi.click/ après le build
      - name: Deploy PHP code
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            set -e
            cd /home/u726808002/bookmi_app

            # 1. Pull latest code (updates bookmi/ subdirectory)
            git pull origin main

            # 2. Sync bookmi/ app files into bookmi_app/ (build environment)
            rsync -a --exclude="vendor/" --exclude="storage/" --exclude=".env" \
              --exclude="node_modules/" --exclude=".git/" \
              bookmi/ ./

            # 3. Install/update PHP dependencies at bookmi_app/
            composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-sodium --quiet

            # 4. Run migrations & clear caches at bookmi_app/
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            # 5. Create storage symlink
            php artisan storage:link --force 2>/dev/null || true

            # 6. Sync the fully-built app to the actual web-served directory
            #    (domains/bookmi.click/ is where the web server loads PHP from)
            #    Preserve: .env and storage/ at destination; exclude git source
            rsync -a \
              --exclude="bookmi/" \
              --exclude="storage/" \
              --exclude=".env" \
              --exclude=".git/" \
              --exclude="node_modules/" \
              /home/u726808002/bookmi_app/ \
              /home/u726808002/domains/bookmi.click/

            # 7. Verify consent routes in the build environment
            echo "--- Registered routes (consent) ---"
            php artisan route:list --path=consents 2>&1 | head -20 || echo "unavailable"
            echo "--- End routes ---"

            echo "PHP deploy OK"
          '

      # ── Déployer les assets Vite vers le webroot ───────────────────────
      - name: Upload Vite assets to webroot
        run: |
          rsync -az --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_ed25519" \
            bookmi/public/build/ \
            u726808002@bookmi.click:/home/u726808002/domains/bookmi.click/public_html/build/

      # ── Synchroniser le manifest vers les deux emplacements publics ────
      - name: Sync manifest to public paths
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            SRC=/home/u726808002/domains/bookmi.click/public_html/build/manifest.json
            # Copier vers bookmi_app/public/build/ (référence CLI)
            mkdir -p /home/u726808002/bookmi_app/public/build/
            cp "$SRC" /home/u726808002/bookmi_app/public/build/manifest.json 2>/dev/null || true
            # Copier vers domains/bookmi.click/public/build/ (si public/ existe)
            mkdir -p /home/u726808002/domains/bookmi.click/public/build/ 2>/dev/null || true
            cp "$SRC" /home/u726808002/domains/bookmi.click/public/build/manifest.json 2>/dev/null || true
            echo "Manifest synced OK"
          '

      # ── Réinitialiser l'OPcache du serveur web ─────────────────────────
      - name: Reset OPcache
        run: |
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bookmi.click/opcache_reset.php)
          echo "OPcache reset HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "OPcache reset OK"
          else
            echo "OPcache reset may have failed (status $HTTP_STATUS) — continuing anyway"
          fi

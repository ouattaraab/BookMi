name: Deploy to Production

# Déclenché uniquement après la réussite du CI Laravel sur main
on:
  workflow_run:
    workflows: ["CI Laravel"]
    types: [completed]
    branches: [main]

# Un seul déploiement à la fois — ne pas annuler un déploiement en cours
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    # Ne déployer que si le CI est passé
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Vite assets ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bookmi/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: bookmi

      - name: Build Vite assets
        run: npm run build
        working-directory: bookmi

      # ── Configurer SSH ─────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 bookmi.click >> ~/.ssh/known_hosts

      # ── Déployer le code PHP ───────────────────────────────────────────
      # Structure confirmée : public_html/index.php charge depuis
      #   $appPath = '/home/u726808002/bookmi_app/bookmi'
      # → Le Laravel app root est bookmi_app/bookmi/ (sous-dossier git)
      # → composer, artisan, migrate, optimize doivent tourner là
      - name: Deploy PHP code
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            set -e

            # 1. Pull latest code (met à jour bookmi_app/bookmi/ — app root réel)
            cd /home/u726808002/bookmi_app
            git stash || true
            git pull origin main

            # 2. Travailler dans le vrai app root (celui que le web server utilise)
            cd /home/u726808002/bookmi_app/bookmi

            # 3. Install/update PHP dependencies
            composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-sodium --quiet

            # 4. Run migrations
            php artisan migrate --force

            # 5. Rebuild caches (route cache généré avec le bon base_path)
            php artisan optimize:clear
            php artisan optimize

            # 6. Create storage symlink (symlink() et exec() désactivés sur Hostinger)
            ln -sf /home/u726808002/bookmi_app/bookmi/storage/app/public \
              /home/u726808002/bookmi_app/bookmi/public/storage 2>/dev/null || true

            # 7. Verify consent routes
            echo "--- Registered routes (consent) ---"
            php artisan route:list --path=consents 2>&1 | head -20 || echo "unavailable"
            echo "--- End routes ---"

            echo "PHP deploy OK"
          '

      # ── Déployer les assets Vite vers le webroot ───────────────────────
      - name: Upload Vite assets to webroot
        run: |
          rsync -az --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_ed25519" \
            bookmi/public/build/ \
            u726808002@bookmi.click:/home/u726808002/domains/bookmi.click/public_html/build/

      # ── Synchroniser le manifest vers le vrai app root ─────────────────
      # public_html/index.php → app root = bookmi_app/bookmi/
      # → le manifest doit être dans bookmi_app/bookmi/public/build/
      - name: Sync manifest to app public path
        run: |
          ssh -p 65002 u726808002@bookmi.click '
            SRC=/home/u726808002/domains/bookmi.click/public_html/build/manifest.json
            # Copier vers bookmi_app/bookmi/public/build/ (vrai app root)
            mkdir -p /home/u726808002/bookmi_app/bookmi/public/build/
            cp "$SRC" /home/u726808002/bookmi_app/bookmi/public/build/manifest.json 2>/dev/null || true
            echo "Manifest synced OK"
          '

      # ── Réinitialiser l'OPcache du serveur web ─────────────────────────
      - name: Reset OPcache
        run: |
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bookmi.click/opcache_reset.php)
          echo "OPcache reset HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "OPcache reset OK"
          else
            echo "OPcache reset may have failed (status $HTTP_STATUS) — continuing anyway"
          fi
